name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.3"

      - name: Install dependencies
        run: go mod download

      - name: Build binaries
        run: |
          # Linux x64
          GOOS=linux GOARCH=amd64 go build -o ./build/watermark-linux-amd64 .

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -o ./build/watermark-linux-arm64 .

          # macOS x64
          GOOS=darwin GOARCH=amd64 go build -o ./build/watermark-darwin-amd64 .

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -o ./build/watermark-darwin-arm64 .

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create new release
        if: ${{ steps.tag_version.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Proxmox Updater API (${{ steps.tag_version.outputs.new_tag }})
          body: |
            Release **${{ steps.tag_version.outputs.new_tag }}**

            ${{ steps.tag_version.outputs.changelog }}

            ---
            Commit: ${{ github.sha }}
          files: |
            ./build/watermark-linux-amd64
            ./build/watermark-linux-arm64
            ./build/watermark-darwin-amd64
            ./build/watermark-darwin-arm64
          draft: false
          prerelease: false
          make_latest: true
